# ============================================
# Docker Compose - Scraping Lead
# ============================================
# Usage :
#   docker compose up gmaps          → scraper Google Maps
#   docker compose up sci            → scraper SCI/Pappers
#   docker compose up company        → scraper Societes (SASU/SAS/EURL/SARL)
#   docker compose up transfer       → transfert GetSales -> Brevo
#   docker compose up scheduler      → cron automatique
#   docker compose run --rm gmaps    → run one-shot puis supprime le conteneur
# ============================================

services:
  # --- Scraper Google Maps (Selenium) ---
  gmaps:
    build: .
    image: scraping-lead:latest
    container_name: scraper-gmaps
    command: gmaps
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOOGLE_SHEETS_MASTER_SPREADSHEET_ID=${GOOGLE_SHEETS_MASTER_SPREADSHEET_ID}
      - GMAPS_HEADLESS=true
    volumes:
      - ./csv:/app/csv
      - ./logs:/app/logs
      - ./config:/app/config
    shm_size: "2g"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          memory: 2G
          cpus: "1"
    networks:
      - scraper-net

  # --- Scraper SCI / Pappers (Playwright) ---
  # Lancé uniquement par le scheduler via cron
  sci:
    build: .
    image: scraping-lead:latest
    container_name: scraper-sci
    command: sci
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./csv:/app/csv
      - ./logs:/app/logs
    restart: "no"
    profiles:
      - cron-only
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    networks:
      - scraper-net

  # --- Scraper Societes SASU/SAS/EURL/SARL (Playwright) ---
  # Lancé uniquement par le scheduler via cron
  company:
    build: .
    image: scraping-lead:latest
    container_name: scraper-company
    command: company
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./csv:/app/csv
      - ./logs:/app/logs
    restart: "no"
    profiles:
      - cron-only
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    networks:
      - scraper-net

  # --- Transfert GetSales -> Brevo ---
  # Lancé uniquement par le scheduler via cron
  transfer:
    build: .
    image: scraping-lead:latest
    container_name: scraper-transfer
    command: transfer
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    restart: "no"
    profiles:
      - cron-only
    networks:
      - scraper-net

  # --- Scheduler (cron) ---
  scheduler:
    build: .
    image: scraping-lead:latest
    container_name: scraper-scheduler
    command: cron
    env_file: .env
    environment:
      - TZ=Europe/Paris
      - CRON_SCI=${CRON_SCI:-15 10 * * *}
      - CRON_COMPANY=${CRON_COMPANY:-20 19 * * *}
      - CRON_TRANSFER=${CRON_TRANSFER:-30 14 * * *}
      - CRON_RECAP=${CRON_RECAP:-0 23 * * *}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./csv:/app/csv
      - ./logs:/app/logs
      - ./config:/app/config
    shm_size: "2g"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2"
    networks:
      - scraper-net

networks:
  scraper-net:
    driver: bridge
